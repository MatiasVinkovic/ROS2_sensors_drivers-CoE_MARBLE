oculus_node:
  ros__parameters:
    ip: ""                       # Sonar IP address. Empty string "" enables auto_discover.
    auto_discover: true           # true | false — if true and ip is empty, discover sonar via UDP broadcast.
    tcp_port: 52100                # TCP port used for the sonar data stream.
    udp_port: 52102                # UDP port used for discovery broadcast.
    discover_timeout: 10.0         # Seconds to wait for UDP discovery response before retrying.
    connect_timeout: 15.0          # Seconds to wait for TCP connection before timing out.
    connect_retries: 3             # Number of TCP connection attempts before giving up.
    connect_retry_delay: 5.0       # Seconds to wait before retrying discovery/connection after a failed attempt.
    read_error_retry_delay: 3.0    # Seconds to wait before reconnecting after a read/socket error.
    no_ip_retry_delay: 10.0        # Seconds to wait before retrying when no IP is set and auto_discover is false.
    range_m: 1.0                  # Sonar max range in meters, sent in the fire message at connection.
    gain_percent: 30.0             # Sonar gain in percent (0-100), sent in the fire message at connection.
    enhance_mode: "auto"           # "auto" | "log" | "sqrt" | "histeq" | "raw" — contrast enhancement before publishing.
    publish_rate_hz: 0.0           # 0.0 = publish every ping received; >0.0 = max publish rate in Hz (throttled).